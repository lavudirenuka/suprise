<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Dancing Script', cursive;
    text-align:center;
    position:relative;
}

/* typing effect */
.typing{
    font-size:42px;
    color:white;
    overflow:hidden;
    white-space:nowrap;
    border-right:3px solid white;
    width:0;
    animation: typing 4s steps(35,end) forwards,
               blink 0.8s infinite;
}

/* typing animation */
@keyframes typing{
    from{width:0}
    to{width:100%}
}

/* cursor blinking */
@keyframes blink{
    0%{border-color:transparent}
    50%{border-color:white}
    100%{border-color:transparent}
}

/* hearts in corners */
.heart{
    position:absolute;
    font-size:45px;
}

.top-left{ top:20px; left:20px; }
.top-right{ top:20px; right:20px; }
.bottom-left{ bottom:20px; left:20px; }
.bottom-right{ bottom:20px; right:20px; }

/* button */
button{
    position:absolute;
    bottom:40px;
    padding:12px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4b6e;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

</style>
</head>

<body>

<div class="heart top-left">❤️</div>
<div class="heart top-right">❤️</div>
<div class="heart bottom-left">❤️</div>
<div class="heart bottom-right">❤️</div>

<h1 class="typing">Hii Fav, Here’s a Small Surprise for You</h1>

<button onclick="location.href='page2.html'">
Open Surprise
</button>

</body>
</html>
