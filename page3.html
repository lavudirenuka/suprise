<!DOCTYPE html>

<html>
<head>
<title>Final Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
flex-direction:column;
background:#fff0f5;
font-family:Arial;
}

.container{
flex:1;
display:flex;
}

/* left side */
.left{
width:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.imageTitle{
font-size:28px;
color:#ff1493;
margin-bottom:15px;
font-weight:bold;
text-shadow:2px 2px 10px pink;
}

.left img{
width:300px;
border-radius:20px;
box-shadow:0 0 20px pink;
}

/* right side lyrics */
.right{
width:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

/* lyric style */
.lyric{
font-size:18px;
color:#ff3366;
margin:8px;
opacity:0;
transition:opacity 1s;
}

.show{
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

];

let audio=document.getElementById("song");

let current=audio.currentTime;

lyrics.forEach(function(line,i){

div.innerText=line.text;

container.appendChild(div);

line.shown=true;

}

});

};
audio.onended=function(){
    window.location.href="page4.html";
}
</script>

</body>
</html>
